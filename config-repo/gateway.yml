server.ssl:
  key-store-type: PKCS12
  key-store: classpath:keystore/edge.p12
  key-store-password: password
  key-alias: localhost

server.port: 8443

spring:
  ssl:
    bundle:
      jks:
        gateway:
          key:
            alias: localhost
          keystore:
            type: PKCS12
            location: classpath:keystore/edge.p12
            password: password

  cloud:
    gateway:
      server:
        webflux:
          forwarded:
            by:
              enabled: true
          trusted-proxies: .*
          x-forwarded:
            host-enabled: true
            port-enabled: true
            prefix-enabled: true
            proto-enabled: true
          routes:
            - id: oauth2-server
              uri: lb://auth-server
              predicates:
                - Path=/oauth2/**
              filters:
                - PreserveHostHeader

            - id: oauth2-login
              uri: lb://auth-server
              predicates:
                - Path=/login/**
              filters:
                - PreserveHostHeader

            - id: oauth2-error
              uri: lb://auth-server
              predicates:
                - Path=/error/**
              filters:
                - PreserveHostHeader

            - id: oauth2-well-known
              uri: lb://auth-server
              predicates:
                - Path=/.well-known/**
              filters:
                - PreserveHostHeader

            - id: product-composite
              uri: lb://product-composite-service
              predicates:
                - Path=/product-composite/**

            - id: product-composite-swagger-ui
              uri: lb://product-composite-service
              predicates:
                - Path=/openapi/**

            - id: eureka-api
              uri: http://${app.eureka-server}:8761
              predicates:
                - Path=/eureka/api/{segment}
              filters:
                - SetPath=/eureka/{segment}

            - id: eureka-web-start
              uri: http://${app.eureka-server}:8761
              predicates:
                - Path=/eureka/web
              filters:
                - SetPath=/

            - id: eureka-web-other
              uri: http://${app.eureka-server}:8761
              predicates:
                - Path=/eureka/**
                
            - id: config-server
              uri: ${spring.cloud.config.uri}
              predicates:
                - Path=/config/**
              filters:
                - RewritePath=/config/(?<segment>.*), /$\{segment}

            - id: host_route_200
              uri: http://httpstat.us
              predicates:
                - Host=i.feel.lucky:8080
                - Path=/headerrouting/**
              filters:
                - SetPath=/200

            - id: host_route_418
              uri: http://httpstat.us
              predicates:
                - Host=im.a.teapot:8080
                - Path=/headerrouting/**
              filters:
                - SetPath=/418

            - id: host_route_501
              uri: http://httpstat.us
              predicates:
                - Path=/headerrouting/**
              filters:
                - SetPath=/501

management.endpoint.gateway.enabled: true
management.endpoint.health.show-details: "ALWAYS"
management.endpoints.web.exposure.include: "*"


logging:
  level:
    root: INFO
    "[org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator]": INFO
    "[org.springframework.cloud.gateway]": TRACE